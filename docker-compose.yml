version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: repoproof-postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=repo_intel
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_dev_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d repo_intel"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: repoproof-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  minio:
    image: minio/minio:latest
    container_name: repoproof-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadminpass
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: repoproof-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app:Z
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_dev_pass@postgres:5432/repo_intel
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadminpass
      - LITELLM_PROXY_URL=http://litellm:4000
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-pk-lf-dev}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-sk-lf-dev}
      - LANGFUSE_HOST=http://langfuse:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: repoproof-worker
    command: celery -A app.celery_app.celery_app worker --loglevel=info -Q analysis,generation,notifications,default
    volumes:
      - ./backend:/app:Z
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_dev_pass@postgres:5432/repo_intel
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadminpass
      - LITELLM_PROXY_URL=http://litellm:4000
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-pk-lf-dev}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-sk-lf-dev}
      - LANGFUSE_HOST=http://langfuse:3000
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: repoproof-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: [ "--config", "/app/config.yaml" ]
    restart: always

  flower:
    image: mher/flower:latest
    container_name: repoproof-flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    container_name: repoproof-langfuse
    ports:
      - "3030:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_dev_pass@postgres:5432/langfuse
      - NEXTAUTH_SECRET=langfuse_dev_secret_key
      - NEXTAUTH_URL=http://localhost:3030
      - SALT=langfuse_dev_salt_string
      - TELEMETRY_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  default:
    name: repoproof-network
    driver: bridge
